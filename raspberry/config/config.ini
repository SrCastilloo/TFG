p6_middle = 700
p6_index = 700
p6_thumb0 = 800
p6_thumb1 = 700
# position 7: For hook movement
# ring pos: move, middle pos: move, index pos: move, thumb0 (linear movement): move
# thumb1 (rotate movement) positioning ist not working right now set to 0 
# This differs with position 2, 3, 4 and 6 in how much we move the rotate thumb
# ring positioning is reverse to other fingers, so open is 700 and close is 3000
p7_ring = 3000
p7_middle = 700
p7_index = 700
p7_thumb0 = 800
p7_thumb1 = 700
# position 8: For tripod movement
# ring pos: open, middle pos: move, index pos: move, thumb0 (linear movement): move
